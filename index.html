:root{--blue:#0057FF;--blue-bg:#EEF3FF;--green:#047857;--green-bg:#ECFDF5;--red:#B91C1C;--red-bg:#FEF2F2;--text:#111827;--text-2:#6B7280;--text-3:#9CA3AF;--border:#E5E7EB;--border-2:#D1D5DB;--bg:#F3F4F6;--card:#FFFFFF;--r:10px;--r-sm:6px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.header{position:sticky;top:0;z-index:200;background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;}

.main{padding:1.25rem 1.5rem 4rem;max-width:1600px;margin:0 auto;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.25rem;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.sc.accent{background:var(--blue);border-color:var(--blue);}
.sc-label{font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.sc.accent .sc-label{color:rgba(255,255,255,.65);}
.sc-val{font-size:22px;font-weight:600;color:var(--text);line-height:1.1;font-family:'DM Mono',monospace;}

.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:1rem;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.rc-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rc-name{font-size:14px;font-weight:600;}
.rc-meta{font-size:11px;color:var(--text-2);}
.rc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.rc-stat{background:var(--card);padding:10px 14px;}
.rc-stat-label{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.rc-stat-val{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);}
.rc-stat-sub{font-size:10px;margin-top:2px;}
.rc-stat-sub.red{color:var(--red);}.rc-stat-sub.green{color:var(--green);}
.rc-locations{padding:10px 14px;font-size:11px;color:var(--text-2);}
.rc-pbar-wrap{height:4px;background:var(--bg);overflow:hidden;}
.rc-pbar-fill{height:100%;}

.search-wrap{position:relative;min-width:200px;}

const REGIONS=['South','East','Midwest','Southwest','West'];
const RCOLORS={South:'#0057FF',East:'#047857',Midwest:'#7C3AED',Southwest:'#B45309',West:'#B91C1C'};

function kpiStats(d,f){
  const val=d[f.ak],tgt=d[f.tk];
  const gap=f.lib?val-tgt:tgt-val;
  const pct=f.lib?Math.round((tgt/val)*100):Math.round((val/tgt)*100);
  const daily=gap>0?gap/DAYS_LEFT:0;
  const weekly=gap>0?gap/WEEKS_LEFT:0;
  return{val,tgt,gap,pct,daily,weekly};
}

function fmtV(val,f){return f&&f.isRev?'$'+Math.round(val).toLocaleString():Math.round(val).toLocaleString();}
function varCls(v,lib){const r=lib?-v:v;return r>0?'pos':r<0?'neg':'neu';}
function varLblFromActTgt(val,tgt){const v=(val-tgt)/tgt;return(v>=0?'+':'')+Math.round(v*100)+'%';}
function fillCls(p){return p>=100?'fill-blue':'fill-red';}
function badge(p){return p>=100?'<span class="badge up">On Track</span>':'<span class="badge off">Behind</span>';}

let activeKpi='rev',activeFilter='all',activeView='locations';

function setView(v,btn){
  activeView=v;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('region-view').style.display=v==='region'?'':'none';
  document.getElementById('location-view').style.display=v==='locations'?'':'none';
  if(v==='region')renderRegions();
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setKpi(id){
  activeKpi=id;
  document.querySelectorAll('.kt').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  render();
}

function revPct(d){return Math.round((d.rev/d.rev_t)*100);}

function buildSummary(){
  const tr=DATA.reduce((s,d)=>s+d.rev,0);
  const tt=DATA.reduce((s,d)=>s+d.rev_t,0);
  const tg=tt-tr;
  const on=DATA.filter(d=>revPct(d)>=100).length;
  const op=Math.round((tr/tt)*100);
  document.getElementById('summary').innerHTML=`
    <div class="sc accent"><div class="sc-label">Total Revenue</div><div class="sc-val">$${Math.round(tr/1000)}K</div><div class="sc-sub">${op}% of target</div></div>
    <div class="sc"><div class="sc-label">Revenue Target</div><div class="sc-val">$${Math.round(tt/1000)}K</div><div class="sc-sub">${DATA.length} locations</div></div>
    <div class="sc"><div class="sc-label">Rev Gap</div><div class="sc-val" style="color:var(--red)">$${Math.round(tg/1000)}K</div><div class="sc-sub">${DAYS_LEFT} days left</div></div>
    <div class="sc"><div class="sc-label">On Track</div><div class="sc-val" style="color:var(--green)">${on}</div><div class="sc-sub">${DATA.length-on} behind target</div></div>
    <div class="sc"><div class="sc-label">Lessons Started</div><div class="sc-val">${DATA.reduce((s,d)=>s+d.lsStart,0)}</div><div class="sc-sub">tgt: ${DATA.reduce((s,d)=>s+d.lsStart_t,0)}</div></div>
    <div class="sc"><div class="sc-label">Lessons Stopped</div><div class="sc-val">${DATA.reduce((s,d)=>s+d.lsStop,0).toLocaleString()}</div><div class="sc-sub">tgt: ${DATA.reduce((s,d)=>s+d.lsStop_t,0).toLocaleString()}</div></div>`;
  document.getElementById('banner-extra').innerHTML=`<b>$${Math.round(tg/1000)}K</b><span> total gap · </span><b>$${Math.round(tg/DAYS_LEFT/100)*100}/day</b><span> needed</span>`;
}

function renderRegions(){
  document.getElementById('region-grid').innerHTML=REGIONS.map(region=>{
    const locs=DATA.filter(d=>d.r===region);
    if(!locs.length)return'';
    const tr=locs.reduce((s,d)=>s+d.rev,0);
    const tt=locs.reduce((s,d)=>s+d.rev_t,0);
    const tg=tt-tr;
    const pct=Math.round((tr/tt)*100);
    const on=locs.filter(d=>revPct(d)>=100).length;
    const daily=tg>0?Math.ceil(tg/DAYS_LEFT):0;
    const weekly=tg>0?Math.ceil(tg/WEEKS_LEFT):0;
    const tns=locs.reduce((s,d)=>s+d.newSt,0),tnsT=locs.reduce((s,d)=>s+d.newSt_t,0);
    const ta=locs.reduce((s,d)=>s+d.attended,0),taT=locs.reduce((s,d)=>s+d.attended_t,0);
    const ls=locs.reduce((s,d)=>s+d.lsStart,0),lsT=locs.reduce((s,d)=>s+d.lsStart_t,0);
    const color=RCOLORS[region];
    return `<div class="rc">
      <div class="rc-head" style="border-left:4px solid ${color};">
        <div><div class="rc-name">${region}</div><div class="rc-meta">${locs.length} locations · ${on} on track · ${locs.length-on} behind</div></div>
        <div style="text-align:right;"><div style="font-size:18px;font-weight:600;font-family:'DM Mono',monospace;">$${Math.round(tr/1000)}K</div><div style="font-size:11px;color:var(--text-2);">${pct}% of $${Math.round(tt/1000)}K target</div></div>
      </div>
      <div class="rc-pbar-wrap"><div class="rc-pbar-fill" style="width:${Math.min(100,pct)}%;background:${pct>=100?'var(--green)':'var(--red)'}"></div></div>
      <div class="rc-stats">
        <div class="rc-stat"><div class="rc-stat-label">Rev Gap</div><div class="rc-stat-val" style="color:${tg>0?'var(--red)':'var(--green)'}">$${Math.round(Math.abs(tg)/1000)}K</div><div class="rc-stat-sub ${tg>0?'red':'green'}">${tg>0?'behind':'ahead'}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">Need / Day</div><div class="rc-stat-val" style="color:${daily>0?'var(--red)':'var(--green)'}">$${daily>0?Math.round(daily/100)*100:0}</div><div class="rc-stat-sub ${daily>0?'red':'green'}">${DAYS_LEFT} days left</div></div>
        <div class="rc-stat"><div class="rc-stat-label">Need / Week</div><div class="rc-stat-val" style="color:${weekly>0?'var(--red)':'var(--green)'}">$${weekly>0?Math.round(weekly/100)*100:0}</div><div class="rc-stat-sub ${weekly>0?'red':'green'}">${Math.round(WEEKS_LEFT*10)/10} wks left</div></div>
        <div class="rc-stat"><div class="rc-stat-label">New Students</div><div class="rc-stat-val">${tns}</div><div class="rc-stat-sub ${tns>=tnsT?'green':'red'}">tgt: ${tnsT}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">Trials Attended</div><div class="rc-stat-val">${ta}</div><div class="rc-stat-sub ${ta>=taT?'green':'red'}">tgt: ${taT}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">Lessons Started</div><div class="rc-stat-val">${ls}</div><div class="rc-stat-sub ${ls>=lsT?'green':'red'}">tgt: ${lsT}</div></div>
      </div>
      <div class="rc-locations">${locs.map(d=>d.l).join(', ')}</div>
    </div>`;
  }).join('');
}

function buildTabs(){
  document.getElementById('kpi-tabs').innerHTML=FIELDS.map(f=>`<button class="kt${f.id===activeKpi?' active':''}" data-id="${f.id}" onclick="setKpi('${f.id}')">${f.label}</button>`).join('');
}

function renderTargetBoxes(k,f){
  const met=k.gap<=0;
  const gL=f.lib?'Over by':'Gap';
  const dL=f.lib?'Reduce/Day':'Per Day';
  const wL=f.lib?'Reduce/Wk':'Per Week';
  return `<div class="targets cols4">
    <div class="tbox"><div class="tbox-lbl">${gL}</div><div class="tbox-val ${met?'green':'red'}">${met?(f.lib?'✓ Good':'Met!'):fmtV(k.gap,f)}</div></div>
    <div class="tbox"><div class="tbox-lbl">${dL}</div><div class="tbox-val ${met?'green':'red'}">${met?'✓':fmtV(k.daily,f)}</div></div>
    <div class="tbox"><div class="tbox-lbl">${wL}</div><div class="tbox-val ${met?'green':'red'}">${met?'✓':fmtV(k.weekly,f)}</div></div>
    <div class="tbox"><div class="tbox-lbl">Target</div><div class="tbox-val">${fmtV(k.tgt,f)}</div></div>
  </div>`;
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort-sel').value;
  const region=document.getElementById('region-sel').value;
  const af=FIELDS.find(f=>f.id===activeKpi);
  let list=DATA.filter(d=>d.l.toLowerCase().includes(q));
  if(region!=='all')list=list.filter(d=>d.r===region);
  if(activeFilter==='behind')list=list.filter(d=>revPct(d)<100);
  if(activeFilter==='ontrack')list=list.filter(d=>revPct(d)>=100);
  const revK=d=>kpiStats(d,FIELDS[0]);
  if(sort==='name')list.sort((a,b)=>a.l.localeCompare(b.l));
  if(sort==='gap')list.sort((a,b)=>revK(b).gap-revK(a).gap);
  if(sort==='pct')list.sort((a,b)=>revPct(a)-revPct(b));
  if(sort==='daily')list.sort((a,b)=>revK(b).daily-revK(a).daily);
  if(!list.length){document.getElementById('grid').innerHTML='<div class="no-results">No locations match.</div>';return;}
  document.getElementById('grid').innerHTML=list.map(d=>{
    const pk=kpiStats(d,af);
    const fp=Math.min(100,pk.pct);
    const rp=revPct(d);
    const vLbl=varLblFromActTgt(d[af.ak],d[af.tk]);
    const vCls=varCls(d[af.ak]-d[af.tk],af.lib);
    const otherRows=FIELDS.filter(f=>f.id!==activeKpi).map(f=>{
      const k=kpiStats(d,f);
      const met=k.gap<=0;
      const fv=varLblFromActTgt(d[f.ak],d[f.tk]);
      const fc=varCls(d[f.ak]-d[f.tk],f.lib);
      const gL=f.lib?'Over':'Gap';
      const dL=f.lib?'-/Day':'/Day';
      const wL=f.lib?'-/Wk':'/Wk';
      return `<div class="kr">
        <div class="kr-left">
          <div class="kr-name">${f.label}${f.lib?' <span style="font-size:9px;opacity:.6">(lower=better)</span>':''}</div>
          <div class="kr-vals"><span class="kr-val">${fmtV(k.val,f)}</span><span class="var-tag ${fc}">${fv}</span><span style="font-size:10px;color:var(--text-3)">/ tgt ${fmtV(k.tgt,f)}</span></div>
        </div>
        <div class="kr-targets">
          <div class="kr-tbox"><span class="kr-tbox-lbl">${gL}</span><span class="kr-tbox-val ${met?'green':'red'}">${met?'✓':fmtV(k.gap,f)}</span></div>
          <div class="kr-tbox"><span class="kr-tbox-lbl">${dL}</span><span class="kr-tbox-val ${met?'green':'red'}">${met?'✓':fmtV(k.daily,f)}</span></div>
          <div class="kr-tbox"><span class="kr-tbox-lbl">${wL}</span><span class="kr-tbox-val ${met?'green':'red'}">${met?'✓':fmtV(k.weekly,f)}</span></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="lc">
      <div class="lc-head">
        <div class="lc-name">${d.l}</div>
        <div style="display:flex;gap:5px;align-items:center;"><span style="font-size:10px;color:var(--text-3);background:var(--bg);padding:2px 6px;border-radius:4px;">${d.r}</span>${badge(rp)}</div>
      </div>
      <div class="lc-primary">
        <div class="prog-top"><span class="prog-val">${fmtV(pk.val,af)}</span><span class="prog-tgt">target: ${fmtV(pk.tgt,af)}</span></div>
        <div class="pbar-wrap"><div class="pbar-fill ${fillCls(fp)}" style="width:${fp}%"></div></div>
        <div class="prog-meta"><span>${fp}% of target</span><span class="var-tag ${vCls}">${vLbl}</span></div>
        ${renderTargetBoxes(pk,af)}
      </div>
      <div class="kpi-rows"><div class="kr-section-label">All KPIs — Gap · Per Day · Per Week</div>${otherRows}</div>
    </div>`;
  }).join('');
}

buildSummary();
buildTabs();
render();
</script>
</body></html>
